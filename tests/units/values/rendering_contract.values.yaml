nameOverride: istio-platform

generic:
  labels:
    platform: edge
    component: shared
  annotations:
    owner: platform-team
    note: inherited

global:
  domain: corp.example.org
  apiVersions:
    istioGateway: custom.istio.io/v1alpha1
    istioVirtualService: custom.istio.io/v1alpha1
    istioDestinationRule: custom.istio.io/v1alpha1
    istioAuthorizationPolicy: custom.security.io/v1alpha1

gateways:
  edge:
    name: edge-gateway
    namespace: edge-gateways
    apiVersion: custom.networking.io/v1alpha2
    labels:
      component: gateway
      tier: edge
    annotations:
      note: external
    selector:
      istio: ingressgateway
    servers:
      - port:
          number: 80
          name: http
          protocol: HTTP
        hosts:
          - '{{ .Values.global.domain }}'

virtualservices:
  edge:
    name: '{{ .Release.Name }}-edge'
    namespace: app-routing
    apiVersion: custom.networking.io/v1alpha2
    labels:
      component: routing
    annotations:
      note: public
    hosts:
      - '{{ .Values.global.domain }}'
    gateways:
      - edge-gateway
    http:
      - name: root
        redirect:
          authority: edge.example.org
          scheme: https
          redirectCode: 308
    exportTo:
      - '.'

destinationrules:
  edge:
    name: edge-destination
    namespace: app-routing
    apiVersion: custom.networking.io/v1alpha2
    labels:
      component: policy
    annotations:
      note: destination
    host: edge.default.svc.cluster.local
    trafficPolicy:
      loadBalancer:
        simple: ROUND_ROBIN
    subsets:
      - name: stable
        labels:
          version: stable
        trafficPolicy:
          loadBalancer:
            simple: LEAST_CONN
    exportTo:
      - '.'
    workloadSelector:
      matchLabels:
        app: edge

authorizationpolicies:
  edge-access:
    name: '{{ .Release.Name }}-edge-access'
    namespace: policy-namespace
    labels:
      component: security
    annotations:
      note: access
    selector:
      matchLabels:
        app: edge
    action: DENY
    rules:
      - to:
          - operation:
              methods:
                - POST
