suite: rendering contract
templates:
  - templates/gateway.yml
  - templates/virtualservice.yml
  - templates/destinationrule.yml
  - templates/authorizationpolicy.yml
release:
  name: unit-test
  namespace: unit-namespace

tests:
  - it: renders no Gateway documents by default
    template: templates/gateway.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no VirtualService documents by default
    template: templates/virtualservice.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no DestinationRule documents by default
    template: templates/destinationrule.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no AuthorizationPolicy documents by default
    template: templates/authorizationpolicy.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: applies helper defaults and overrides for Gateway
    values:
      - values/rendering_contract.values.yaml
    template: templates/gateway.yml
    documentSelector:
      path: metadata.name
      value: istio-platform-edge-gateway
    asserts:
      - isKind:
          of: Gateway
      - equal:
          path: apiVersion
          value: custom.istio.io/v1alpha1
      - equal:
          path: metadata.namespace
          value: unit-namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: istio-platform
      - equal:
          path: metadata.labels.platform
          value: edge
      - equal:
          path: metadata.labels.component
          value: gateway
      - equal:
          path: metadata.labels.tier
          value: edge
      - equal:
          path: metadata.annotations.owner
          value: platform-team
      - equal:
          path: metadata.annotations.note
          value: external
      - equal:
          path: spec.selector.istio
          value: ingressgateway
      - equal:
          path: spec.servers[0].hosts[0]
          value: corp.example.org

  - it: skips Gateway documents for null map entries
    values:
      - values/null_resources.values.yaml
    template: templates/gateway.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: applies helper defaults and overrides for VirtualService
    values:
      - values/rendering_contract.values.yaml
    template: templates/virtualservice.yml
    documentSelector:
      path: metadata.name
      value: unit-test-edge
    asserts:
      - isKind:
          of: VirtualService
      - equal:
          path: apiVersion
          value: custom.istio.io/v1alpha1
      - equal:
          path: metadata.namespace
          value: unit-namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: istio-platform
      - equal:
          path: metadata.labels.component
          value: routing
      - equal:
          path: metadata.annotations.note
          value: public
      - equal:
          path: spec.hosts[0]
          value: corp.example.org
      - equal:
          path: spec.gateways[0]
          value: edge-gateway
      - equal:
          path: spec.http[0].route[0].destination.host
          value: edge.default.svc.cluster.local
      - equal:
          path: spec.exportTo[0]
          value: .

  - it: skips VirtualService documents for null map entries
    values:
      - values/null_resources.values.yaml
    template: templates/virtualservice.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: applies helper defaults and overrides for DestinationRule
    values:
      - values/rendering_contract.values.yaml
    template: templates/destinationrule.yml
    documentSelector:
      path: metadata.name
      value: istio-platform-edge-destination
    asserts:
      - isKind:
          of: DestinationRule
      - equal:
          path: apiVersion
          value: custom.istio.io/v1alpha1
      - equal:
          path: metadata.namespace
          value: unit-namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: istio-platform
      - equal:
          path: metadata.labels.component
          value: policy
      - equal:
          path: metadata.annotations.note
          value: destination
      - equal:
          path: spec.host
          value: edge.default.svc.cluster.local
      - equal:
          path: spec.subsets[0].name
          value: stable
      - equal:
          path: spec.subsets[0].labels.version
          value: stable
      - equal:
          path: spec.workloadSelector.matchLabels.app
          value: edge

  - it: skips DestinationRule documents for null map entries
    values:
      - values/null_resources.values.yaml
    template: templates/destinationrule.yml
    asserts:
      - hasDocuments:
          count: 0

  - it: applies helper defaults and overrides for AuthorizationPolicy
    values:
      - values/rendering_contract.values.yaml
    template: templates/authorizationpolicy.yml
    documentSelector:
      path: metadata.name
      value: unit-test-edge-access
    asserts:
      - isKind:
          of: AuthorizationPolicy
      - equal:
          path: apiVersion
          value: custom.security.io/v1alpha1
      - equal:
          path: metadata.namespace
          value: policy-namespace
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: istio-platform
      - equal:
          path: metadata.labels.component
          value: security
      - equal:
          path: metadata.annotations.note
          value: access
      - equal:
          path: spec.action
          value: DENY
      - equal:
          path: spec.selector.matchLabels.app
          value: edge
      - equal:
          path: spec.rules[0].to[0].operation.methods[0]
          value: POST

  - it: skips AuthorizationPolicy documents for null map entries
    values:
      - values/null_resources.values.yaml
    template: templates/authorizationpolicy.yml
    asserts:
      - hasDocuments:
          count: 0
